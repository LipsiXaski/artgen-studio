<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Art Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎨 ArtGen Studio</h1>
        <p>Генерация уникальных изображений для творчества и бизнеса</p>
    </header>

    <main>
        <section class="generator">
            <textarea id="prompt" placeholder="Опишите, что хотите создать... (например: минималистичный горный пейзаж, закат, цифровая живопись)"></textarea>
            <button id="generateBtn">✨ Сгенерировать</button>
            <div id="result" class="result-box">
                <p>Здесь появится изображение</p>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 ArtGen Studio. Контент создан ИИ для легальных творческих проектов.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
